<script>
    let currentServerUrl = '';

    // JSON-RPC 2.0 call
    async function jsonRpcCall(serverUrl, method, params = {}) {
        const requestBody = {
            jsonrpc: "2.0",
            method: method,
            params: params,
            id: Date.now()
        };
        
        const response = await fetch(serverUrl, {
            method: 'POST',
            mode: 'cors',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(requestBody)
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        if (data.error) {
            throw new Error(`[${data.error.code}] ${data.error.message}`);
        }
        return data.result;
    }

    // API Methods
    async function getStatus(serverUrl) {
        return await jsonRpcCall(serverUrl, 'get_status', {});
    }

    async function getUtxos(serverUrl, scripthashHex) {
        return await jsonRpcCall(serverUrl, 'get_utxos', { scripthash_hex: scripthashHex });
    }

    async function getHistoryPage(serverUrl, scripthashHex, page = 0, limit = 10) {
        return await jsonRpcCall(serverUrl, 'get_history_page', { 
            scripthash_hex: scripthashHex, 
            page: page, 
            limit: limit 
        });
    }

    // Format FLS amount (8 decimals)
    function formatFlips(amount) {
        if (!amount && amount !== 0) return 'N/A';
        const fls = amount / 100000000;
        return fls.toFixed(8) + ' FLS';
    }

    // Load dashboard
    async function loadExplorer() {
        let serverUrl = document.getElementById('serverUrl').value.trim();
        if (!serverUrl) {
            showError('Please enter a lightserver URL');
            return;
        }
        
        if (!serverUrl.startsWith('http')) {
            serverUrl = 'http://' + serverUrl;
        }
        
        // Ensure /rpc endpoint
        if (!serverUrl.endsWith('/rpc')) {
            serverUrl = serverUrl.replace(/\/$/, '') + '/rpc';
        }
        
        currentServerUrl = serverUrl;
        const statusBadge = document.getElementById('statusBadge');
        statusBadge.textContent = '⏳ Connecting...';
        statusBadge.className = 'status-badge status-offline';
        
        const contentDiv = document.getElementById('content');
        contentDiv.innerHTML = '<div class="loading">🔄 Connecting to ' + serverUrl + '...</div>';
        
        try {
            const status = await getStatus(serverUrl);
            statusBadge.textContent = '● Online';
            statusBadge.className = 'status-badge status-online';
            
            renderDashboard(status, serverUrl);
        } catch (error) {
            console.error('Connection error:', error);
            statusBadge.textContent = 'Offline';
            statusBadge.className = 'status-badge status-offline';
            
            let errorMsg = `
                <strong>Failed to connect to ${serverUrl}</strong><br><br>
                Error: ${error.message}<br><br>
            `;
            
            if (error.message === 'Failed to fetch') {
                errorMsg += `
                    <strong>Troubleshooting:</strong><br>
                    1. Make sure the lightserver is running: <code>./build/finalis-node --with-lightserver</code><br>
                    2. Check if you can access from browser: <a href="${serverUrl}" target="_blank">${serverUrl}</a><br>
                    3. Test with curl:<br>
                       <code>curl -X POST ${serverUrl} -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","id":1,"method":"get_status","params":{}}'</code><br>
                    4. Check if CORS is blocking: The lightserver may need to add CORS headers
                `;
            }
            
            showError(errorMsg);
        }
    }
